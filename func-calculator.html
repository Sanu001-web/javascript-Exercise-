<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>calculator</title>
        <style>
    h2{
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }
    button{
      font-size: 22px;
      padding: 10px 20px;
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      font-weight: 600;
      margin: 5px;
      border: 2px solid rgb(163, 165, 154);
      border-radius: 50px;
      cursor: pointer;
      background-color: rgb(211, 217, 215);
    }
    button:hover{
        background-color: rgb(184, 190, 189);
    }
    button:active{
       background-color: rgb(232, 239, 238); 
    }
    .calculator-container{
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: rgb(15, 35, 52);
        width: 50%;
    }
  </style>
    </head>
    <body>

        <h2>Calculator:</h2>

        <div class="calculator-container">

            <p>
                <button onclick="updateCalculator('1');">1</button>
                <button onclick="updateCalculator('2');">2</button>
                <button onclick="updateCalculator('3');">3</button>
                <button onclick="updateCalculator('+');">+</button>
            </p>

            <p>       
                <button onclick="updateCalculator('4');">4</button>
                <button onclick="updateCalculator('5');">5</button>
                <button onclick="updateCalculator('6');">6</button>
                <button onclick="updateCalculator('-');">-</button>
            </p>

            <p>
                <button onclick="updateCalculator('7');">7</button>
                <button onclick="updateCalculator('8');">8</button>
                <button onclick="updateCalculator('9');">9</button>
                <button onclick="updateCalculator('/');">/</button>
            </p>

           <p>
                <button onclick="updateCalculator('.');">.</button>
                <button onclick="updateCalculator('0');">0</button>
                <button onclick="updateCalculator('*');">*</button>

                <button onclick="calculation=eval(calculation);
                console.log(calculation)">=</button>
            </p>

            <p>
                <button onclick="calculation='';
                 console.log('cleared' ,calculation)">Reset
                </button>
            </p>
        </div>

        <script>
            function updateCalculator(value) {
                calculation += value;
                console.log(calculation);
            }
            let calculation='';
            let save=0;
        </script>


     </body>
</html>
