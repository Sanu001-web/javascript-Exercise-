    button{
      border:none;
      background-color:transparent;
      transition: transform 0.7s;
    }
    button:active{
      transform: rotateX(360deg);
    }
    .move-btn{
      border: 1px solid black;
      padding: 10px 20px;
      font-size: 22px;
      font-weight: 600;
      border-radius: 5px;
      cursor: pointer;
    }
    .move-btn:hover{
      background-color: rgb(186, 214, 239);
      color: rgb(114, 114, 7);
    }
  </style>

<button class="move-btn" onclick="playGame('heads')"> Heads</button>
<button class="move-btn" onclick="playGame('tails')"> Tails</button>
<button class="move-btn" onclick="
  score.wins=0;
  score.losses=0;
  alert('Cleared!')
  localStorage.removeItem('score');">Rest </button>
<script>

  const score = JSON.parse(localStorage.getItem('score')) ||{wins: 0, losses: 0};

  function playGame(guess){
    const randomNumber=Math.random();
    const result=(randomNumber<0.5 ? 'heads':'tails');
    console.log( (guess===result?'You win!' : 'You lose!'))
    if(guess===result){
      score.wins++;
    }
    else{
      score.losses++;
    }
    
    localStorage.setItem('score',JSON.stringify(score));
    console.log(score);
  }

  </script>
