<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>coin-flip</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    #flipButton {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    img {
      margin-top: 20px;
      width: 100px;
      height: 100px;
    }
    button{
      border:none;
      background-color:transparent;
      transition: transform 0.7s;
    }
    button:active{
      transform: rotateX(360deg);
    }
  </style>
</head>
<body>
  <h1>Coin Flip</h1>
  <button id="flipButton" onclick="
  const randomNumber=Math.random();
  const result=(randomNumber<0.5 ? 'heads':'tails');
  // console.log('Random number:',randomNumber)

  console.log('Result:',result);
  
  const guess =prompt('Enter your guess move:');
  console.log('Your guessed move:',guess);
  console.log( (result===guess?'You win!' : 'You lose'))

  "> <img id="flipButton" src="https://cdn-icons-png.flaticon.com/128/9382/9382189.png">  </button>
  
  <script></script>
</body>
</html>
