<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functions</title>
    <style>
    h1{
      color: rgb(149, 1, 1);
      text-decoration: wavy underline rgb(91, 36, 36);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-weight: 700;
    }
    p{
      color: rgb(0, 0, 0);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 18px;
      font-weight: 500;
    }
    button{
      background-color: rgb(164, 44, 44);
      color: white;
      border: none;
      padding: 10px 20px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 16px;
      margin: 4px 2px;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
    <script src="Function.js"></script>
  </head>
  <body>
    <h1>Functions</h1>
    <p>Functions are reusable code blocks designed for particular tasks
      Functions are executed when they are called or invoked
      Functions are fundamental in all programming languages</p>

    <button onclick="greet('John')">Greet John</button>
    <button onclick="greet('shaan')">Greet shaan</button>
    <button onclick="greet('Alice')">Greet Alice</button>

  </body>
</html>
