<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet">
    <style>
    h2{
      font-weight: 500;
      font-family: 'roboto';
    }
    .js-subs-btn{
      padding: 10px 25px;
      font-size: 20px;
      border: none;
      border-radius: 20px;
      background-color: rgb(0,0,0);
      color: rgb(250,250,250);
      cursor: pointer;
    }
    .js-subs-btn:active{
      background-color: rgb(185, 181, 181);
    }
    a,p{
      font-family: 'roboto';
      font-size: 20px;
      /* padding-top:54px; */
      margin-top: 50px;
    }
    .js-cost-input{
      padding: 5px 10px;
      font-size: 18px;
      cursor: pointer;
    }
    .cal-btn{
     font-size: 18px; 
     padding: 5px 10px;
    }
    .css-model-container{
      margin-top: 100px;
    }
  </style>
  </head>
  <body>
    <h2>Youtube Subscribe Button</h2>
    <button onclick="
     subscribe();
     " class="js-subs-btn">Subscribe</button>
    <p>Rock Paper Scissors</p>
    <a href="dom-rock-paper-ss09.html">Click here</a>
    <p>Amazon Shipping Calculator</p>
    <p>Orders under $40 = +$10 shipping.</p>
    <p>Orders over $40 = FREE shipping. </p>
    <input onkeydown="
    handleCostKeydown(event);
    " class="js-cost-input" type="text" placeholder="Cost of order">
    <button onclick=" 
     calculateTotal();
    " class="cal-btn">Calculate</button>
    <p class="js-show-value"></p>
    <br>
    <p class="css-model-container">
      <a class="css-model"
        href="https://supersimple.dev/projects/dom-with-css/">CSS version of
        these projects</a>
    </p>

    <script>

        function handleCostKeydown(event){
            if(event.key === 'Enter')
          {
            calculateTotal();
          }
        }

      function calculateTotal(){
            const innerInput = document.querySelector('.js-cost-input');
            let cost = Number(innerInput.value);

            if( cost < 40){
              cost = cost + 10;
            }
            document.querySelector('.js-show-value').
            innerHTML = `$${cost}`;
          
      }
      function subscribe(){
          const jsBtnElem = document.querySelector('.js-subs-btn');
        //  console.log(jsBtnElem);
        if (jsBtnElem.innerText === 'Subscribe') {
          jsBtnElem.innerHTML = 'Subscribed'
        }
        else{
          jsBtnElem.innerHTML = 'Subscribe'
        }
          }
    </script>
  </body>
</html>
